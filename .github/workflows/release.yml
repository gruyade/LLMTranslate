name: Build & Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller build.spec --clean

      - name: Verify build output
        run: |
          if (!(Test-Path "dist/LLMTranslate.exe")) {
            Write-Error "dist/LLMTranslate.exe not found"
            exit 1
          }
          Write-Host "Build successful: $(Get-Item dist/LLMTranslate.exe | Select-Object -ExpandProperty Length) bytes"
        shell: pwsh

      - name: Generate release tag
        id: tag
        run: |
          $short_sha = "${{ github.sha }}".Substring(0, 7)
          $date = Get-Date -Format "yyyyMMdd"
          $tag = "build-${date}-${short_sha}"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "name=LLMTranslate ${date} (${short_sha})" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## LLMTranslate Auto Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### インストール方法
            1. `LLMTranslate.exe` をダウンロード
            2. 任意のフォルダに配置して実行

            > **Note:** Tesseract OCR が別途必要な場合は [tesseract-ocr/tesseract](https://github.com/tesseract-ocr/tesseract) からインストール
          files: dist/LLMTranslate.exe
          prerelease: false
          make_latest: true
