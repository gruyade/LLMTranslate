name: Build & Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller build.spec --clean

      - name: Verify build output
        run: |
          if (!(Test-Path "dist/LLMTranslate/LLMTranslate.exe")) {
            Write-Error "dist/LLMTranslate/LLMTranslate.exe not found"
            exit 1
          }
          if (!(Test-Path "dist/LLMTranslate/_internal/rapidocr_onnxruntime/models/ch_PP-OCRv4_det_infer.onnx")) {
            Write-Error "RapidOCR ONNX model not found in build output"
            exit 1
          }
          Write-Host "Build successful"
        shell: pwsh

      - name: Package as ZIP
        run: |
          Compress-Archive -Path "dist/LLMTranslate/*" -DestinationPath "dist/LLMTranslate.zip"
          Write-Host "ZIP created: $(Get-Item dist/LLMTranslate.zip | Select-Object -ExpandProperty Length) bytes"
        shell: pwsh

      - name: Generate release tag
        id: tag
        run: |
          $short_sha = "${{ github.sha }}".Substring(0, 7)
          $date = Get-Date -Format "yyyyMMdd"
          $tag = "build-${date}-${short_sha}"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "name=LLMTranslate ${date} (${short_sha})" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## LLMTranslate Auto Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### 変更内容

            **feat**
            - オーバーレイUX改善 — 自動非表示・ホバー拡大・リサイズバグ修正・翻訳キー追加
            - オーバーレイボタンUIのモダン化・文字位置修正

            **fix**
            - TranslationClientに設定のdeepcopyを渡す設計に変更
            - _deep_mergeのコピー方式をdeepcopyに変更
            - BubbleWidgetの削除時にレイアウトからも除去
            - ocr_analyzeの推論時間をデバッグログに出力
            - test_has_text_content_error_handlingのモック階層を修正

            **perf**
            - OCR処理の軽減 - 画像縮小・フォントサイズキャッシュ・事前チェックオプション化
            - オーバーレイ位置保存にデバウンスを導入

            **refactor**
            - AppServiceを導入しGUI層とビジネスロジックを分離
            - I18nManagerにresetメソッドとdocstringを追加
            - QTimerのインポートをファイル先頭に移動
            - _apply_wda_exclude_from_captureを共通モジュールに抽出
            - ConfigManagerにget_presetメソッドを追加

            **test**
            - GUIボタン押下相当の統合テストを追加
            - i18n/translator/config/captureのテストを追加

            **build**
            - pyproject.tomlに[project]セクションと依存関係を追加

            **docs**
            - .kiro ステアリング・スペックをGit管理対象に追加
            - コミットルール・テスト同期ルールをステアリングに追加

            ### インストール方法
            1. `LLMTranslate.zip` をダウンロードして展開
            2. `LLMTranslate.exe` を実行
          files: dist/LLMTranslate.zip
          prerelease: false
          make_latest: true
